<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#C44536" />
  <title>Warung Nusantara — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-icon">🌶️</div>
        <div>
          <h1 class="brand-name">Warung Nusantara</h1>
          <div class="brand-tag">Cita Rasa Indonesia</div>
        </div>
      </div>
      <div class="meja-badge" id="mejaBadge">Meja —</div>
    </div>
  </header>

  <nav class="categories" id="categories"></nav>

  <main class="menu-list" id="menuList"></main>

  <button class="cart-fab" id="cartFab" type="button" aria-label="Lihat keranjang">
    <span class="cart-fab-count" id="cartCount">0</span>
    <span class="cart-fab-total" id="cartTotal">0 SAR</span>
    <span class="cart-fab-label">Lihat Pesanan →</span>
  </button>

  <div class="cart-modal" id="cartModal" hidden>
    <div class="cart-modal-inner">
      <header class="cart-header">
        <h2>Pesanan Anda</h2>
        <button class="close-btn" id="closeCart" type="button" aria-label="Tutup">×</button>
      </header>
      <div class="cart-items" id="cartItems"></div>
      <footer class="cart-footer">
        <div class="cart-total-row">
          <span>Total</span>
          <strong id="cartFinalTotal">0 SAR</strong>
        </div>
        <a class="order-btn disabled" id="orderBtn" target="_blank" rel="noopener">
          <span class="order-btn-icon">📱</span>
          <span>Pesan via WhatsApp</span>
        </a>
        <p class="cart-note">Pesanan akan dikirim ke admin via WhatsApp</p>
      </footer>
    </div>
  </div>

  <script src="menu.js"></script>
  <script src="app.js"></script>
</body>
</html>
