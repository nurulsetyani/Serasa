<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Serasa QR Code — Print</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; font-family: Georgia, serif; padding: 20px; }

  h1 { text-align: center; color: #0D0D0D; font-size: 24px; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 24px; }

  .controls {
    display: flex; gap: 12px; align-items: center;
    justify-content: center; margin-bottom: 24px; flex-wrap: wrap;
  }
  .controls input {
    padding: 8px 14px; border: 2px solid #D4AF37; border-radius: 8px;
    font-size: 13px; width: 320px; outline: none;
  }
  .btn-print {
    background: #D4AF37; color: #0D0D0D; border: none;
    padding: 10px 24px; border-radius: 8px; font-weight: bold;
    font-size: 14px; cursor: pointer;
  }
  .btn-regen {
    background: #0D0D0D; color: #D4AF37; border: 2px solid #D4AF37;
    padding: 10px 18px; border-radius: 8px; font-weight: bold;
    font-size: 14px; cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    max-width: 960px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border: 2.5px solid #D4AF37;
    border-radius: 12px;
    overflow: hidden;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .card-top {
    background: #0D0D0D;
    padding: 12px 8px 8px;
    border-bottom: 1.5px solid #D4AF37;
  }
  .brand { color: #D4AF37; font-size: 18px; font-weight: bold; letter-spacing: 2px; }
  .brand-sub { color: #888; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

  .qr-wrap {
    padding: 14px;
    background: white;
  }
  .qr-wrap img { width: 160px; height: 160px; display: block; margin: 0 auto; }

  .card-bottom {
    background: #0D0D0D;
    border-top: 1.5px solid #D4AF37;
    padding: 10px 8px;
  }
  .scan-text { color: #888; font-size: 9px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .table-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 50%;
    background: #D4AF37; color: #0D0D0D;
    font-size: 22px; font-weight: bold;
    font-family: Georgia, serif;
    margin: 0 auto 4px;
  }
  .table-label { color: #888; font-size: 9px; }
  .cam-hint { color: #D4AF37; font-size: 8px; margin-top: 6px; line-height: 1.4; }

  /* PRINT */
  @media print {
    body { background: white; padding: 0; }
    h1, .subtitle, .controls { display: none !important; }
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 0;
      max-width: 100%;
    }
    .card {
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 6px;
      box-shadow: none;
    }
  }
</style>
</head>
<body>

<h1>🌿 SERASA — QR Code Meja</h1>
<p class="subtitle">Print & laminating, pasang di setiap meja</p>

<div class="controls">
  <input type="text" id="baseUrl" value="https://serasa-opal.vercel.app" placeholder="URL app kamu..." />
  <button class="btn-regen" onclick="generate()">🔄 Generate</button>
  <button class="btn-print" onclick="window.print()">🖨️ Print</button>
</div>

<div class="grid" id="grid"></div>

<script>
const TABLES = 8;

function generate() {
  const base = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  for (let i = 1; i <= TABLES; i++) {
    const url = `${base}/?table=${i}`;
    const qr  = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}&bgcolor=ffffff&color=0D0D0D&qzone=2`;

    grid.innerHTML += `
      <div class="card">
        <div class="card-top">
          <div class="brand">🌿 SERASA</div>
          <div class="brand-sub">Indonesian Restaurant · Saudi Arabia</div>
        </div>
        <div class="qr-wrap">
          <img src="${qr}" alt="Meja ${i}" />
        </div>
        <div class="card-bottom">
          <div class="scan-text">Scan to Order · امسح للطلب</div>
          <div class="table-num">${i}</div>
          <div class="table-label">Meja &nbsp;|&nbsp; Table &nbsp;|&nbsp; طاولة</div>
          <div class="cam-hint">📷 Gunakan kamera HP · Use phone camera · استخدم كاميرا الهاتف</div>
        </div>
      </div>`;
  }
}

generate();
</script>
</body>
</html>
